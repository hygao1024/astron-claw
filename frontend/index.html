<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astron Claw</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0e27;
  --bg-secondary: #111638;
  --bg-tertiary: #1a2040;
  --bg-input: #151a3a;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0b8;
  --text-muted: #6b7194;
  --accent: #4f8ff7;
  --accent-hover: #6ba1ff;
  --accent-dim: rgba(79, 143, 247, 0.15);
  --user-bubble: #2563eb;
  --user-bubble-text: #ffffff;
  --assistant-bubble: #1e2448;
  --assistant-bubble-text: #e8eaed;
  --border: #252b52;
  --error: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --tool-bg: #1a1f42;
  --tool-border: #2d3466;
  --thinking-bg: #14193a;
  --thinking-border: #252b52;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  --radius: 12px;
  --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --transition: 0.2s ease;
}

[data-theme="light"] {
  --bg-primary: #f7f8fc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f2f8;
  --bg-input: #ffffff;
  --text-primary: #1a1a2e;
  --text-secondary: #555770;
  --text-muted: #8e90a6;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-dim: rgba(37, 99, 235, 0.1);
  --user-bubble: #2563eb;
  --user-bubble-text: #ffffff;
  --assistant-bubble: #f0f2f8;
  --assistant-bubble-text: #1a1a2e;
  --border: #e2e4ee;
  --tool-bg: #f5f6fa;
  --tool-border: #dce0ed;
  --thinking-bg: #f5f6fa;
  --thinking-border: #dce0ed;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ===== Utility ===== */
.hidden { display: none !important; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Login Screen ===== */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 20px;
  background: var(--bg-primary);
}

.login-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-brand {
  text-align: center;
  margin-bottom: 32px;
}

.login-brand .logo {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  margin-bottom: 16px;
  object-fit: cover;
}

.login-brand h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.login-brand p {
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 4px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: border-color var(--transition);
}

.form-group input:focus {
  border-color: var(--accent);
}

.form-group input::placeholder {
  color: var(--text-muted);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: translateY(-1px);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.login-status {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  min-height: 20px;
  transition: color var(--transition);
}

.login-status.error { color: var(--error); }
.login-status.connecting { color: var(--warning); }
.login-status.success { color: var(--success); }

.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== Chat Screen ===== */
#chat-screen {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* -- Header -- */
.chat-header {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}

.chat-header .brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 700;
  flex: 1;
}

.chat-header .brand .logo-sm {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background var(--transition);
}

.status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.disconnected { background: var(--error); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 16px;
}

.icon-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

/* -- Bot Status Banner -- */
.bot-banner {
  padding: 8px 20px;
  font-size: 13px;
  text-align: center;
  background: var(--accent-dim);
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  transition: all 0.3s ease;
}

.bot-banner.disconnected {
  background: rgba(239, 68, 68, 0.1);
  color: var(--error);
}

/* -- Messages Area -- */
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.messages-list {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* -- Message Bubbles -- */
.message {
  display: flex;
  flex-direction: column;
  animation: msgIn 0.3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-items: flex-end;
}

.message.assistant {
  align-items: flex-start;
}

.message-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  overflow-wrap: break-word;
  position: relative;
}

.message.user .message-bubble {
  background: var(--user-bubble);
  color: var(--user-bubble-text);
  border-bottom-right-radius: 4px;
}

.message.assistant .message-bubble {
  background: var(--assistant-bubble);
  color: var(--assistant-bubble-text);
  border-bottom-left-radius: 4px;
}

.message-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  padding: 0 4px;
}

/* -- Thinking Block -- */
.thinking-block {
  max-width: 85%;
  border: 1px solid var(--thinking-border);
  background: var(--thinking-bg);
  border-radius: var(--radius-sm);
  overflow: hidden;
  animation: msgIn 0.3s ease;
}

.thinking-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  user-select: none;
  transition: background var(--transition);
}

.thinking-header:hover {
  background: var(--bg-tertiary);
}

.thinking-chevron {
  display: inline-block;
  transition: transform 0.2s ease;
  font-size: 10px;
}

.thinking-block.collapsed .thinking-chevron {
  transform: rotate(-90deg);
}

.thinking-block.collapsed .thinking-content {
  display: none;
}

.thinking-content {
  padding: 8px 12px 12px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  border-top: 1px solid var(--thinking-border);
  white-space: pre-wrap;
}

/* -- Tool Call / Result -- */
.tool-block {
  max-width: 85%;
  border: 1px solid var(--tool-border);
  background: var(--tool-bg);
  border-radius: var(--radius-sm);
  overflow: hidden;
  animation: msgIn 0.3s ease;
}

.tool-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: rgba(79, 143, 247, 0.06);
  border-bottom: 1px solid var(--tool-border);
  font-family: var(--font-mono);
}

.tool-header .tool-icon {
  font-size: 14px;
}

.tool-body {
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
}

/* -- Streaming / Typing -- */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* -- Markdown in assistant messages -- */
.message.assistant .message-bubble h1,
.message.assistant .message-bubble h2,
.message.assistant .message-bubble h3 {
  margin: 12px 0 6px;
  line-height: 1.3;
}

.message.assistant .message-bubble h1 { font-size: 1.3em; }
.message.assistant .message-bubble h2 { font-size: 1.15em; }
.message.assistant .message-bubble h3 { font-size: 1.05em; }

.message.assistant .message-bubble p {
  margin: 6px 0;
}

.message.assistant .message-bubble ul,
.message.assistant .message-bubble ol {
  margin: 6px 0;
  padding-left: 20px;
}

.message.assistant .message-bubble li {
  margin: 2px 0;
}

.message.assistant .message-bubble a {
  color: var(--accent);
  text-decoration: underline;
}

.message.assistant .message-bubble blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}

.message.assistant .message-bubble table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
  font-size: 13px;
}

.message.assistant .message-bubble th,
.message.assistant .message-bubble td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}

.message.assistant .message-bubble th {
  background: var(--bg-tertiary);
  font-weight: 600;
}

/* -- Code blocks -- */
.code-wrapper {
  position: relative;
  margin: 8px 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
}

.code-wrapper .code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: var(--bg-tertiary);
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.code-wrapper .copy-btn {
  padding: 2px 8px;
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font);
  transition: all var(--transition);
}

.code-wrapper .copy-btn:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.code-wrapper pre {
  margin: 0;
  padding: 12px;
  overflow-x: auto;
  background: var(--bg-primary) !important;
}

.code-wrapper code {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
}

.message.assistant .message-bubble code:not(.code-wrapper code) {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.9em;
}

/* -- System Messages -- */
.system-message {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  padding: 4px 0;
  animation: msgIn 0.3s ease;
}

.system-message.error-msg {
  color: var(--error);
}

/* -- Input Area -- */
.input-area {
  padding: 16px 20px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-wrapper {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  transition: border-color var(--transition);
}

.input-wrapper:focus-within {
  border-color: var(--accent);
}

.input-wrapper textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font);
  line-height: 1.5;
  resize: none;
  max-height: 200px;
  min-height: 24px;
  padding: 4px 0;
}

.input-wrapper textarea::placeholder {
  color: var(--text-muted);
}

.send-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
}

.send-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: scale(1.05);
}

.send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.send-btn svg {
  width: 18px;
  height: 18px;
}

/* ===== Attachment Button ===== */
.attach-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  color: var(--text-muted);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
}

.attach-btn:hover {
  color: var(--accent);
  background: var(--accent-dim);
}

.attach-btn svg {
  width: 20px;
  height: 20px;
}

/* ===== File Preview Bar ===== */
.file-preview {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  animation: msgIn 0.2s ease;
}

.file-preview-thumb {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg-primary);
}

.file-preview-info {
  flex: 1;
  min-width: 0;
}

.file-preview-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-preview-size {
  font-size: 12px;
  color: var(--text-muted);
}

.file-preview-remove {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  transition: all var(--transition);
}

.file-preview-remove:hover {
  color: var(--error);
  border-color: var(--error);
  background: rgba(239, 68, 68, 0.1);
}

/* ===== Media in Messages ===== */
.media-image {
  max-width: 300px;
  max-height: 300px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: block;
  margin: 4px 0;
  transition: opacity var(--transition);
}

.media-image:hover {
  opacity: 0.9;
}

.media-file-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin: 4px 0;
  max-width: 300px;
}

.message.user .media-file-card {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.2);
}

.media-file-icon {
  font-size: 24px;
  flex-shrink: 0;
}

.media-file-info {
  flex: 1;
  min-width: 0;
}

.media-file-name {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.media-file-size {
  font-size: 11px;
  color: var(--text-muted);
}

.message.user .media-file-size {
  color: rgba(255, 255, 255, 0.7);
}

.media-file-download {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-dim);
  color: var(--accent);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
  font-size: 14px;
  flex-shrink: 0;
  transition: all var(--transition);
}

.media-file-download:hover {
  background: var(--accent);
  color: #fff;
}

.media-audio {
  margin: 4px 0;
  max-width: 300px;
  width: 100%;
}

.media-video {
  max-width: 300px;
  max-height: 240px;
  border-radius: var(--radius-sm);
  margin: 4px 0;
}

.media-caption {
  margin-top: 4px;
  font-size: 14px;
  line-height: 1.5;
}

/* ===== Lightbox ===== */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  transition: background 0.2s ease;
}

.lightbox-close:hover {
  background: rgba(255, 255, 255, 0.2);
}

/* ===== Drag-and-Drop Overlay ===== */
.drag-overlay {
  position: absolute;
  inset: 0;
  z-index: 1000;
  background: rgba(79, 143, 247, 0.1);
  border: 3px dashed var(--accent);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  animation: fadeIn 0.2s ease;
}

.drag-overlay-text {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  background: var(--bg-secondary);
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
}

/* ===== Session Drawer ===== */
.session-overlay {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(0, 0, 0, 0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.session-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.session-drawer {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 260px;
  z-index: 950;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  box-shadow: 4px 0 24px rgba(0, 0, 0, 0.2);
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.session-drawer.open {
  transform: translateX(0);
}

.session-drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.session-drawer-header h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}

.session-drawer-actions {
  display: flex;
  gap: 4px;
}

.session-drawer-btn {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  transition: all var(--transition);
}

.session-drawer-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.session-drawer-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-color: var(--accent);
}

.session-new-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin: 12px 12px 8px;
  padding: 10px;
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all var(--transition);
}

.session-new-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 12px;
}

.session-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 2px;
}

.session-item:hover {
  background: var(--bg-tertiary);
}

.session-item.active {
  background: var(--accent-dim);
}

.session-item-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  color: var(--text-muted);
}

.session-item.active .session-item-icon {
  background: var(--accent);
  color: #fff;
}

.session-item-info {
  flex: 1;
  min-width: 0;
}

.session-item-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-item-preview {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.session-item-time {
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
  white-space: nowrap;
}

body.drawer-pinned #chat-screen {
  margin-left: 260px;
}

body.drawer-pinned .session-drawer {
  transform: translateX(0);
  box-shadow: none;
}

body.drawer-pinned .session-overlay {
  display: none;
}

/* ===== Mobile ===== */
@media (max-width: 640px) {
  .login-card { padding: 28px 20px; }
  .chat-header { padding: 10px 14px; }
  .messages-container { padding: 14px; }
  .input-area { padding: 10px 14px; }
  .message-bubble { max-width: 92%; }
  .thinking-block, .tool-block { max-width: 92%; }

  body.drawer-pinned #chat-screen { margin-left: 0; }
  body.drawer-pinned .session-drawer { transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,0.2); }
  body.drawer-pinned .session-overlay { display: block; }
}
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->

  <div class="login-card">

<!-- Session Drawer -->
<div class="session-overlay" id="session-overlay" onclick="hideSessionPanel()"></div>
<div class="session-drawer" id="session-drawer">
  <div class="session-drawer-header">
    <h3>Sessions</h3>
    <div class="session-drawer-actions">
      <button class="session-drawer-btn" id="pin-btn" onclick="togglePinDrawer()" title="Pin drawer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

<!-- CDN Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
// ===== State =====
let ws = null;
let token = '';
let serverUrl = '';
let isStreaming = false;
let currentAssistantEl = null;
let currentAssistantText = '';
let reconnectAttempts = 0;
let reconnectTimer = null;
let botConnected = false;
let pendingFile = null;  // { file: File, previewUrl: string|null }

// ===== Multi-session State =====
let currentSessionId = null;
let sessionList = [];        // [{id, number}, ...]
let sessionMessages = {};    // sessionId -> innerHTML snapshot
let sessionMeta = {};        // sessionId -> {preview, timestamp}
let drawerPinned = false;

const MAX_RECONNECT_ATTEMPTS = 10;
const RECONNECT_BASE_DELAY = 1000;

// ===== Markdown Setup =====
if (typeof marked !== 'undefined') {
  const renderer = new marked.Renderer();

  renderer.code = function({ text, lang }) {
    const language = lang || 'plaintext';
    let highlighted;
    try {
      if (hljs && hljs.getLanguage(language)) {
        highlighted = hljs.highlight(text, { language }).value;
      } else {
        highlighted = hljs.highlightAuto(text).value;
      }
    } catch {
      highlighted = escapeHtml(text);
    }
    const id = 'code-' + Math.random().toString(36).slice(2, 10);
    return `<div class="code-wrapper">
      <div class="code-header">
        <span>${escapeHtml(language)}</span>
        <button class="copy-btn" onclick="copyCode('${id}')">Copy</button>
      </div>
      <pre><code id="${id}" class="hljs language-${escapeHtml(language)}">${highlighted}</code></pre>
    </div>`;
  };

  marked.setOptions({
    renderer,
    gfm: true,
    breaks: true,
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function relativeTime(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h';
  return Math.floor(hours / 24) + 'd';
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    try {
      return marked.parse(text);
    } catch {
      return escapeHtml(text);
    }
  }
  return escapeHtml(text).replace(/\n/g, '<br>');
}

// ===== Theme =====
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-icon').innerHTML = next === 'dark' ? '&#9790;' : '&#9788;';

  // Switch highlight.js theme
  const hljsLink = document.getElementById('hljs-theme');
  if (next === 'light') {
    hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  } else {
    hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
  }

  localStorage.setItem('astron-theme', next);
}

// Load saved theme
(function() {
  const saved = localStorage.getItem('astron-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme-icon').innerHTML = saved === 'dark' ? '&#9790;' : '&#9788;';
  }
})();

// ===== Connection =====
function handleConnect() {
  token = document.getElementById('token-input').value.trim();
  if (!token) {
    showLoginStatus('Please enter a bot token', 'error');
    return;
  }

  const serverInput = document.getElementById('server-input').value.trim();
  if (serverInput) {
    serverUrl = serverInput.replace(/\/+$/, '');
  } else {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    serverUrl = `${proto}//${location.host}`;
  }

  // Normalize serverUrl to ws/wss
  if (serverUrl.startsWith('http://')) {
    serverUrl = 'ws://' + serverUrl.slice(7);
  } else if (serverUrl.startsWith('https://')) {
    serverUrl = 'wss://' + serverUrl.slice(8);
  } else if (!serverUrl.startsWith('ws://') && !serverUrl.startsWith('wss://')) {
    serverUrl = 'ws://' + serverUrl;
  }

  connectWebSocket();
}

function connectWebSocket() {
  const connectBtn = document.getElementById('connect-btn');
  connectBtn.disabled = true;
  showLoginStatus('<span class="spinner"></span> Connecting...', 'connecting');

  const url = `${serverUrl}/bridge/chat?token=${encodeURIComponent(token)}`;

  try {
    ws = new WebSocket(url);
  } catch (e) {
    showLoginStatus('Invalid server URL', 'error');
    connectBtn.disabled = false;
    return;
  }

  ws.onopen = function() {
    reconnectAttempts = 0;
    showLoginStatus('Validating token...', 'connecting');
  };

  ws.onmessage = function(event) {
    try {
      const msg = JSON.parse(event.data);
      // First message from server means token is valid — enter chat
      if (!document.getElementById('login-screen').classList.contains('hidden')) {
        showLoginStatus('Connected!', 'success');
        setTimeout(() => {
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('chat-screen').classList.remove('hidden');
          updateConnectionStatus(true);
          restoreDrawerState();
          document.getElementById('msg-input').focus();
        }, 300);
      }
      handleServerMessage(msg);
    } catch (e) {
      console.error('Failed to parse message:', e);
    }
  };

  ws.onerror = function() {
    if (document.getElementById('login-screen').classList.contains('hidden')) {
      // Already in chat
      updateConnectionStatus(false);
    } else {
      showLoginStatus('Connection failed', 'error');
      connectBtn.disabled = false;
    }
  };

  ws.onclose = function(event) {
    if (document.getElementById('login-screen').classList.contains('hidden')) {
      updateConnectionStatus(false);
      finalizeStream();
      addSystemMessage('Connection lost. Attempting to reconnect...');
      attemptReconnect();
    } else {
      const reason = event.reason || 'Connection closed';
      showLoginStatus(reason, 'error');
      connectBtn.disabled = false;
    }
  };
}

function attemptReconnect() {
  if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
    addSystemMessage('Reconnection failed after multiple attempts. Please refresh.', true);
    return;
  }

  reconnectAttempts++;
  const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts - 1), 30000);

  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    addSystemMessage(`Reconnecting (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
    const url = `${serverUrl}/bridge/chat?token=${encodeURIComponent(token)}`;

    try {
      ws = new WebSocket(url);
    } catch {
      attemptReconnect();
      return;
    }

    ws.onopen = function() {
      reconnectAttempts = 0;
      updateConnectionStatus(true);
      addSystemMessage('Reconnected successfully!');
      document.getElementById('msg-input').focus();
    };

    ws.onmessage = function(event) {
      try {
        const msg = JSON.parse(event.data);
        handleServerMessage(msg);
      } catch (e) {
        console.error('Failed to parse message:', e);
      }
    };

    ws.onerror = function() {
      updateConnectionStatus(false);
    };

    ws.onclose = function() {
      updateConnectionStatus(false);
      finalizeStream();
      attemptReconnect();
    };
  }, delay);
}

function disconnect() {
  clearTimeout(reconnectTimer);
  reconnectAttempts = MAX_RECONNECT_ATTEMPTS; // Prevent auto-reconnect
  if (ws) {
    ws.close();
    ws = null;
  }
  isStreaming = false;
  currentAssistantEl = null;
  currentAssistantText = '';
  clearPendingFile();

  // Reset session state
  currentSessionId = null;
  sessionList = [];
  sessionMessages = {};
  sessionMeta = {};
  unpinDrawer();

  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('messages-list').innerHTML = '';
  document.getElementById('connect-btn').disabled = false;
  showLoginStatus('', '');
  reconnectAttempts = 0;

  const banner = document.getElementById('bot-banner');
  banner.classList.add('hidden');
  // Reset drawer DOM state (keep pinned preference in localStorage)
  document.getElementById('session-drawer').classList.remove('open', 'pinned');
  document.getElementById('session-overlay').classList.remove('open');
  document.body.classList.remove('drawer-pinned');
}

function updateConnectionStatus(connected) {
  const dot = document.getElementById('ws-status-dot');
  const text = document.getElementById('ws-status-text');

  dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
  text.textContent = connected ? 'Connected' : 'Disconnected';
}

function showLoginStatus(html, type) {
  const el = document.getElementById('login-status');
  el.innerHTML = html;
  el.className = 'login-status ' + (type || '');
}

// ===== Message Handling =====
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'chunk':
      handleChunk(msg.content || '');
      break;
    case 'thinking':
      handleThinking(msg.content || '');
      break;
    case 'tool_call':
      handleToolCall(msg.name || 'unknown', msg.input || '');
      break;
    case 'done':
      handleDone();
      break;
    case 'error':
      handleError(msg.content || 'Unknown error');
      break;
    case 'bot_status':
      handleBotStatus(msg.connected);
      break;
    case 'message':
      handleMediaMessage(msg);
      break;
    case 'session_info':
      handleSessionInfo(msg);
      break;
    case 'new_session_ack':
      handleNewSessionAck(msg);
      break;
    case 'switch_session_ack':
      handleSwitchSessionAck(msg);
      break;
    default:
      console.log('Unknown message type:', msg.type);
  }
}

function handleChunk(content) {
  if (!isStreaming) {
    isStreaming = true;
    currentAssistantText = '';
    currentAssistantEl = createAssistantMessage();
    setInputEnabled(false);
  }
  currentAssistantText += content;
  updateAssistantMessage();
  scrollToBottom();
}

function handleThinking(content) {
  const list = document.getElementById('messages-list');
  const block = document.createElement('div');
  block.className = 'thinking-block';
  block.innerHTML = `
    <div class="thinking-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="thinking-chevron">&#9660;</span>
      <span>Thinking...</span>
    </div>
    <div class="thinking-content">${escapeHtml(content)}</div>
  `;
  list.appendChild(block);
  scrollToBottom();
}

function handleToolCall(name, input) {
  finalizeStream();
  const list = document.getElementById('messages-list');
  const block = document.createElement('div');
  block.className = 'tool-block';

  let formattedInput = input;
  try {
    const parsed = JSON.parse(input);
    formattedInput = JSON.stringify(parsed, null, 2);
  } catch { /* keep original */ }

  block.innerHTML = `
    <div class="tool-header">
      <span class="tool-icon">&#9881;</span>
      <span>${escapeHtml(name)}</span>
    </div>
    <div class="tool-body">${escapeHtml(formattedInput)}</div>
  `;
  list.appendChild(block);
  scrollToBottom();
}

function handleToolResult(content) {
  // Tool results may appear between chunks; don't finalize stream yet.
  // Display as a collapsible block similar to tool_call.
  const list = document.getElementById('messages-list');
  const block = document.createElement('div');
  block.className = 'tool-block';

  let formatted = content;
  try {
    const parsed = JSON.parse(content);
    formatted = JSON.stringify(parsed, null, 2);
  } catch { /* keep original */ }

  block.innerHTML = `
    <div class="tool-header">
      <span class="tool-icon">&#9881;</span>
      <span>Tool Result</span>
    </div>
    <div class="tool-body">${escapeHtml(formatted)}</div>
  `;
  list.appendChild(block);
  scrollToBottom();
}

function handleDone() {
  finalizeStream();
  setInputEnabled(true);
  document.getElementById('msg-input').focus();
}

function handleError(content) {
  finalizeStream();
  addSystemMessage(content, true);
  setInputEnabled(true);
}

function handleBotStatus(connected) {
  botConnected = connected;
  const banner = document.getElementById('bot-banner');
  if (connected) {
    banner.textContent = 'Bot connected';
    banner.className = 'bot-banner';
  } else {
    banner.textContent = 'Bot disconnected -- waiting for bot to connect';
    banner.className = 'bot-banner disconnected';
  }
  banner.classList.remove('hidden');
}

function handleMediaMessage(msg) {
  finalizeStream();
  const msgType = msg.msgType || 'file';
  const media = msg.media;
  const caption = msg.content || '';

  const list = document.getElementById('messages-list');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  if (media && media.downloadUrl) {
    bubble.innerHTML = renderMediaContent(msgType, media, false);
  }

  if (caption) {
    bubble.innerHTML += `<div class="media-caption">${renderMarkdown(caption)}</div>`;
  }

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(new Date());

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(time);
  list.appendChild(msgDiv);
  scrollToBottom();
}

// ===== Rendering Helpers =====
function createAssistantMessage() {
  const list = document.getElementById('messages-list');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(new Date());

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(time);
  list.appendChild(msgDiv);

  return bubble;
}

function updateAssistantMessage() {
  if (!currentAssistantEl) return;
  currentAssistantEl.innerHTML = renderMarkdown(currentAssistantText);
}

function finalizeStream() {
  if (isStreaming && currentAssistantEl && currentAssistantText) {
    currentAssistantEl.innerHTML = renderMarkdown(currentAssistantText);
  }
  isStreaming = false;
  currentAssistantEl = null;
  currentAssistantText = '';
}

function addUserMessage(text) {
  const list = document.getElementById('messages-list');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(new Date());

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(time);
  list.appendChild(msgDiv);
  scrollToBottom();

  // Update session meta for drawer preview
  if (currentSessionId) {
    sessionMeta[currentSessionId] = { preview: text.slice(0, 50), timestamp: Date.now() };
  }
}

function addUserMediaMessage(msgType, file, caption, media) {
  const list = document.getElementById('messages-list');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';

  // For the user's own message, show a local preview
  if (msgType === 'image') {
    const localUrl = URL.createObjectURL(file);
    bubble.innerHTML = `<img class="media-image" src="${localUrl}" alt="${escapeHtml(file.name)}" onclick="openLightbox(this.src)">`;
  } else if (msgType === 'audio') {
    const localUrl = URL.createObjectURL(file);
    bubble.innerHTML = `<audio class="media-audio" controls preload="none"><source src="${localUrl}" type="${escapeHtml(file.type)}"></audio>`;
  } else if (msgType === 'video') {
    const localUrl = URL.createObjectURL(file);
    bubble.innerHTML = `<video class="media-video" controls preload="metadata"><source src="${localUrl}" type="${escapeHtml(file.type)}"></video>`;
  } else {
    bubble.innerHTML = `<div class="media-file-card">
      <span class="media-file-icon">&#128196;</span>
      <div class="media-file-info">
        <div class="media-file-name">${escapeHtml(file.name)}</div>
        <div class="media-file-size">${formatFileSize(file.size)}</div>
      </div>
    </div>`;
  }

  if (caption) {
    bubble.innerHTML += `<div class="media-caption">${escapeHtml(caption)}</div>`;
  }

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(new Date());

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(time);
  list.appendChild(msgDiv);
  scrollToBottom();
}

function addSystemMessage(text, isError) {
  const list = document.getElementById('messages-list');
  const div = document.createElement('div');
  div.className = 'system-message' + (isError ? ' error-msg' : '');
  div.textContent = text;
  list.appendChild(div);
  scrollToBottom();
}

function formatTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ===== Media Helpers =====
function getHttpBaseUrl() {
  let base = serverUrl;
  if (base.startsWith('ws://')) base = 'http://' + base.slice(5);
  else if (base.startsWith('wss://')) base = 'https://' + base.slice(6);
  // Remove /bridge/chat path suffix if present
  base = base.replace(/\/bridge\/chat\/?$/, '');
  return base;
}

function getMediaUrl(downloadUrl) {
  return getHttpBaseUrl() + downloadUrl + '?token=' + encodeURIComponent(token);
}

function formatFileSize(bytes) {
  if (!bytes || bytes === 0) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function getMsgTypeFromMime(mimeType) {
  if (!mimeType) return 'file';
  if (mimeType.startsWith('image/')) return 'image';
  if (mimeType.startsWith('audio/')) return 'audio';
  if (mimeType.startsWith('video/')) return 'video';
  return 'file';
}

function renderMediaContent(msgType, media, isUser) {
  const url = getMediaUrl(media.downloadUrl);
  const fileName = escapeHtml(media.fileName || 'file');
  const fileSize = formatFileSize(media.fileSize);
  const safeUrl = url.replace(/'/g, "\\'").replace(/"/g, '&quot;');

  switch (msgType) {
    case 'image':
      return `<img class="media-image" src="${safeUrl}" alt="${fileName}" onclick="openLightbox(this.src)" loading="lazy">`;
    case 'audio':
      return `<audio class="media-audio" controls preload="none"><source src="${safeUrl}" type="${escapeHtml(media.mimeType || '')}">Your browser does not support audio.</audio>`;
    case 'video':
      return `<video class="media-video" controls preload="metadata"><source src="${safeUrl}" type="${escapeHtml(media.mimeType || '')}">Your browser does not support video.</video>`;
    default:
      return `<div class="media-file-card">
        <span class="media-file-icon">&#128196;</span>
        <div class="media-file-info">
          <div class="media-file-name">${fileName}</div>
          ${fileSize ? '<div class="media-file-size">' + fileSize + '</div>' : ''}
        </div>
        <a class="media-file-download" href="${safeUrl}" download="${fileName}" title="Download">&#8595;</a>
      </div>`;
  }
}

// ===== File Selection & Preview =====
function handleFileSelect(files) {
  if (!files || files.length === 0) return;
  const file = files[0];
  setPendingFile(file);
  // Reset the file input so the same file can be re-selected
  document.getElementById('file-input').value = '';
}

function setPendingFile(file) {
  clearPendingFile();
  const previewEl = document.getElementById('file-preview');
  const isImage = file.type.startsWith('image/');
  let previewUrl = null;

  if (isImage) {
    previewUrl = URL.createObjectURL(file);
  }

  pendingFile = { file, previewUrl };

  let thumbHtml;
  if (isImage && previewUrl) {
    thumbHtml = `<img class="file-preview-thumb" src="${previewUrl}" alt="Preview">`;
  } else {
    thumbHtml = `<div class="file-preview-thumb" style="display:flex;align-items:center;justify-content:center;font-size:22px;">&#128196;</div>`;
  }

  previewEl.innerHTML = `
    ${thumbHtml}
    <div class="file-preview-info">
      <div class="file-preview-name">${escapeHtml(file.name)}</div>
      <div class="file-preview-size">${formatFileSize(file.size)}</div>
    </div>
    <button class="file-preview-remove" onclick="clearPendingFile()" title="Remove">&#10005;</button>
  `;
  previewEl.classList.remove('hidden');
}

function clearPendingFile() {
  if (pendingFile && pendingFile.previewUrl) {
    URL.revokeObjectURL(pendingFile.previewUrl);
  }
  pendingFile = null;
  const previewEl = document.getElementById('file-preview');
  previewEl.innerHTML = '';
  previewEl.classList.add('hidden');
}

// ===== Upload =====
async function uploadFile(file) {
  const base = getHttpBaseUrl();
  const formData = new FormData();
  formData.append('file', file);

  const resp = await fetch(base + '/api/media/upload', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData,
  });

  if (!resp.ok) {
    const text = await resp.text();
    throw new Error('Upload failed: ' + (text || resp.statusText));
  }

  return await resp.json();
}

// ===== Lightbox =====
function openLightbox(url) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = url;
  lb.classList.remove('hidden');
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.add('hidden');
  document.getElementById('lightbox-img').src = '';
}

// ===== Drag and Drop =====
(function setupDragDrop() {
  let dragCounter = 0;

  document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('messages-container');
    if (!container) return;

    container.addEventListener('dragenter', function(e) {
      e.preventDefault();
      dragCounter++;
      if (dragCounter === 1) showDragOverlay();
    });

    container.addEventListener('dragleave', function(e) {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) { dragCounter = 0; hideDragOverlay(); }
    });

    container.addEventListener('dragover', function(e) {
      e.preventDefault();
    });

    container.addEventListener('drop', function(e) {
      e.preventDefault();
      dragCounter = 0;
      hideDragOverlay();
      if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        handleFileSelect(e.dataTransfer.files);
      }
    });
  });

  function showDragOverlay() {
    const container = document.getElementById('messages-container');
    if (container.querySelector('.drag-overlay')) return;
    const overlay = document.createElement('div');
    overlay.className = 'drag-overlay';
    overlay.innerHTML = '<div class="drag-overlay-text">Drop file to attach</div>';
    container.appendChild(overlay);
  }

  function hideDragOverlay() {
    const container = document.getElementById('messages-container');
    const overlay = container.querySelector('.drag-overlay');
    if (overlay) overlay.remove();
  }
})();

// ===== Sending =====
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const hasFile = !!pendingFile;

  if ((!text && !hasFile) || !ws || ws.readyState !== WebSocket.OPEN) return;

  if (hasFile) {
    const file = pendingFile.file;
    const caption = text;
    clearPendingFile();
    input.value = '';
    input.style.height = 'auto';
    setInputEnabled(false);

    // Show user message with a sending placeholder
    const msgType = getMsgTypeFromMime(file.type);
    addUserMediaMessage(msgType, file, caption, null);

    uploadFile(file).then(function(result) {
      // Send the media message via WebSocket
      const wsMsg = {
        type: 'message',
        msgType: msgType,
        content: caption,
        media: {
          mediaId: result.mediaId,
          fileName: result.fileName,
          mimeType: result.mimeType,
          fileSize: result.fileSize,
          downloadUrl: result.downloadUrl,
        }
      };
      ws.send(JSON.stringify(wsMsg));
      setInputEnabled(true);
    }).catch(function(err) {
      addSystemMessage('File upload failed: ' + err.message, true);
      setInputEnabled(true);
    });
  } else {
    addUserMessage(text);
    ws.send(JSON.stringify({ type: 'message', content: text }));
    input.value = '';
    input.style.height = 'auto';
    setInputEnabled(false);
    scrollToBottom();
  }
}

function newSession() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  saveCurrentSessionMessages();
  ws.send(JSON.stringify({ type: 'new_session' }));
  finalizeStream();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function setInputEnabled(enabled) {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  input.disabled = !enabled;
  btn.disabled = !enabled;
  if (enabled) {
    input.focus();
  }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ===== Session Management =====
function saveCurrentSessionMessages() {
  if (currentSessionId) {
    sessionMessages[currentSessionId] = document.getElementById('messages-list').innerHTML;
  }
}

function restoreSessionMessages(id) {
  const list = document.getElementById('messages-list');
  list.innerHTML = sessionMessages[id] || '';
  scrollToBottom();
}

function switchSession(id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (id === currentSessionId) {
    if (!drawerPinned) hideSessionPanel();
    return;
  }
  finalizeStream();
  saveCurrentSessionMessages();
  ws.send(JSON.stringify({ type: 'switch_session', sessionId: id }));
}

function toggleSessionPanel() {
  if (drawerPinned) {
    unpinDrawer();
  } else {
    pinDrawer();
  }
}

function hideSessionPanel() {
  if (drawerPinned) return;
  document.getElementById('session-drawer').classList.remove('open');
  document.getElementById('session-overlay').classList.remove('open');
}

function togglePinDrawer() {
  if (drawerPinned) {
    unpinDrawer();
  } else {
    pinDrawer();
  }
}

function pinDrawer() {
  drawerPinned = true;
  localStorage.setItem('astron-drawer-pinned', '1');
  const drawer = document.getElementById('session-drawer');
  drawer.classList.remove('open');
  drawer.classList.add('pinned');
  document.getElementById('session-overlay').classList.remove('open');
  document.body.classList.add('drawer-pinned');
  document.getElementById('pin-btn').classList.add('pinned');
  document.getElementById('close-drawer-btn').style.display = 'none';
}

function unpinDrawer() {
  drawerPinned = false;
  localStorage.setItem('astron-drawer-pinned', '0');
  const drawer = document.getElementById('session-drawer');
  drawer.classList.remove('pinned');
  document.body.classList.remove('drawer-pinned');
  document.getElementById('pin-btn').classList.remove('pinned');
  document.getElementById('close-drawer-btn').style.display = '';
}

function restoreDrawerState() {
  if (drawerPinned) {
    const drawer = document.getElementById('session-drawer');
    drawer.classList.add('pinned');
    document.body.classList.add('drawer-pinned');
    document.getElementById('pin-btn').classList.add('pinned');
    document.getElementById('close-drawer-btn').style.display = 'none';
  }
}

function renderSessionPanel() {
  const listEl = document.getElementById('session-list');
  // Render newest first
  const reversed = [...sessionList].reverse();
  listEl.innerHTML = reversed.map(s => {
    const active = s.id === currentSessionId ? ' active' : '';
    const meta = sessionMeta[s.id] || { createdAt: Date.now(), preview: '' };
    const preview = meta.preview ? escapeHtml(meta.preview) : 'New conversation';
    const time = relativeTime(meta.createdAt);
    return `<div class="session-item${active}" onclick="switchSession('${s.id}')">
      <div class="session-item-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="session-item-body">
        <div class="session-item-title">Session ${s.number}</div>
        <div class="session-item-preview">${preview}</div>
      </div>
      <div class="session-item-time">${time}</div>
    </div>`;
  }).join('');
}

// ===== Scroll =====
function scrollToBottom() {
  const container = document.getElementById('messages-container');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

// ===== Copy Code =====
function copyCode(id) {
  const codeEl = document.getElementById(id);
  if (!codeEl) return;
  const text = codeEl.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = codeEl.closest('.code-wrapper').querySelector('.copy-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {});
}

// ===== Multi-session Handling =====
function handleSessionInfo(msg) {
  currentSessionId = msg.sessionId;
  sessionList = msg.sessions || [];
  if (!sessionMessages[currentSessionId]) {
    sessionMessages[currentSessionId] = '';
    sessionMeta[currentSessionId] = { preview: '', timestamp: Date.now() };
  }
  renderSessionPanel();
}

function handleNewSessionAck(msg) {
  saveCurrentSessionMessages();
  currentSessionId = msg.sessionId;
  sessionList = msg.sessions || [];
  sessionMessages[currentSessionId] = '';
  sessionMeta[currentSessionId] = { preview: '', timestamp: Date.now() };
  document.getElementById('messages-list').innerHTML = '';
  finalizeStream();
  setInputEnabled(true);
  renderSessionPanel();
}

function handleSwitchSessionAck(msg) {
  saveCurrentSessionMessages();
  currentSessionId = msg.sessionId;
  sessionList = msg.sessions || [];
  restoreSessionMessages(currentSessionId);
  finalizeStream();
  setInputEnabled(true);
  renderSessionPanel();
}

function newSession() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'new_session' }));
  }
}

function switchSession(id) {
  if (id === currentSessionId) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'switch_session', sessionId: id }));
  }
}

function saveCurrentSessionMessages() {
  if (!currentSessionId) return;
  const list = document.getElementById('messages-list');
  sessionMessages[currentSessionId] = list.innerHTML;
  // Update meta with last user message preview
  const userBubbles = list.querySelectorAll('.message.user .message-bubble');
  if (userBubbles.length > 0) {
    const lastBubble = userBubbles[userBubbles.length - 1];
    sessionMeta[currentSessionId] = {
      preview: lastBubble.textContent.slice(0, 50),
      timestamp: Date.now(),
    };
  }
}

function restoreSessionMessages(id) {
  const list = document.getElementById('messages-list');
  list.innerHTML = sessionMessages[id] || '';
  scrollToBottom();
}

// ===== Session Drawer =====
function toggleSessionPanel() {
  const drawer = document.getElementById('session-drawer');
  const overlay = document.getElementById('session-overlay');
  if (drawerPinned) {
    unpinDrawer();
    return;
  }
  const isOpen = drawer.classList.contains('open');
  if (isOpen) {
    hideSessionPanel();
  } else {
    drawer.classList.add('open');
    overlay.classList.add('visible');
    renderSessionPanel();
  }
}

function hideSessionPanel() {
  if (drawerPinned) return;
  document.getElementById('session-drawer').classList.remove('open');
  document.getElementById('session-overlay').classList.remove('visible');
}

function togglePinDrawer() {
  if (drawerPinned) {
    unpinDrawer();
  } else {
    pinDrawer();
  }
}

function pinDrawer() {
  drawerPinned = true;
  document.body.classList.add('drawer-pinned');
  document.getElementById('session-drawer').classList.add('open');
  document.getElementById('session-overlay').classList.remove('visible');
  document.getElementById('pin-btn').classList.add('active');
  localStorage.setItem('astron-drawer-pinned', '1');
}

function unpinDrawer() {
  drawerPinned = false;
  document.body.classList.remove('drawer-pinned');
  document.getElementById('session-drawer').classList.remove('open');
  document.getElementById('session-overlay').classList.remove('visible');
  document.getElementById('pin-btn').classList.remove('active');
  localStorage.removeItem('astron-drawer-pinned');
}

function restoreDrawerState() {
  if (localStorage.getItem('astron-drawer-pinned') === '1') {
    pinDrawer();
  }
}

function renderSessionPanel() {
  const listEl = document.getElementById('session-list');
  if (!listEl) return;
  listEl.innerHTML = '';
  // Show sessions in reverse order (newest first)
  const items = [...sessionList].reverse();
  for (const s of items) {
    const isActive = s.id === currentSessionId;
    const meta = sessionMeta[s.id] || {};
    const preview = meta.preview || 'No messages yet';
    const timeStr = meta.timestamp ? relativeTime(meta.timestamp) : '';
    const div = document.createElement('div');
    div.className = 'session-item' + (isActive ? ' active' : '');
    div.onclick = function() { switchSession(s.id); };
    div.innerHTML = `
      <div class="session-item-icon">&#128172;</div>
      <div class="session-item-info">
        <div class="session-item-title">Session ${s.number}</div>
        <div class="session-item-preview">${escapeHtml(preview)}</div>
      </div>
      <div class="session-item-time">${escapeHtml(timeStr)}</div>
    `;
    listEl.appendChild(div);
  }
}

function relativeTime(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}

// ===== Init =====
document.getElementById('token-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleConnect();
});

document.getElementById('server-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleConnect();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
