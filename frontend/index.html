<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astron Claw</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0e27;
  --bg-secondary: #111638;
  --bg-tertiary: #1a2040;
  --bg-input: #151a3a;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0b8;
  --text-muted: #6b7194;
  --accent: #4f8ff7;
  --accent-hover: #6ba1ff;
  --accent-dim: rgba(79, 143, 247, 0.15);
  --user-bubble: #2563eb;
  --user-bubble-text: #ffffff;
  --assistant-bubble: #1e2448;
  --assistant-bubble-text: #e8eaed;
  --border: #252b52;
  --error: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --tool-bg: #1a1f42;
  --tool-border: #2d3466;
  --thinking-bg: #14193a;
  --thinking-border: #252b52;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  --radius: 12px;
  --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --transition: 0.2s ease;
}

[data-theme="light"] {
  --bg-primary: #f7f8fc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f2f8;
  --bg-input: #ffffff;
  --text-primary: #1a1a2e;
  --text-secondary: #555770;
  --text-muted: #8e90a6;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-dim: rgba(37, 99, 235, 0.1);
  --user-bubble: #2563eb;
  --user-bubble-text: #ffffff;
  --assistant-bubble: #f0f2f8;
  --assistant-bubble-text: #1a1a2e;
  --border: #e2e4ee;
  --tool-bg: #f5f6fa;
  --tool-border: #dce0ed;
  --thinking-bg: #f5f6fa;
  --thinking-border: #dce0ed;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ===== Utility ===== */
.hidden { display: none !important; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Login Screen ===== */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 20px;
  background: var(--bg-primary);
}

.login-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-brand {
  text-align: center;
  margin-bottom: 32px;
}

.login-brand .logo {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  margin-bottom: 16px;
  object-fit: cover;
}

.login-brand h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.login-brand p {
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 4px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  transition: border-color var(--transition);
}

.form-group input:focus {
  border-color: var(--accent);
}

.form-group input::placeholder {
  color: var(--text-muted);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: translateY(-1px);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.login-status {
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  min-height: 20px;
  transition: color var(--transition);
}

.login-status.error { color: var(--error); }
.login-status.connecting { color: var(--warning); }
.login-status.success { color: var(--success); }

.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== Chat Screen ===== */
#chat-screen {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* -- Header -- */
.chat-header {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}

.chat-header .brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 700;
  flex: 1;
}

.chat-header .brand .logo-sm {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background var(--transition);
}

.status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.disconnected { background: var(--error); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 16px;
}

.icon-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

/* -- Bot Status Banner -- */
.bot-banner {
  padding: 8px 20px;
  font-size: 13px;
  text-align: center;
  background: var(--accent-dim);
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  transition: all 0.3s ease;
}

.bot-banner.disconnected {
  background: rgba(239, 68, 68, 0.1);
  color: var(--error);
}

/* -- Messages Area -- */
.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.messages-list {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* -- Message Bubbles -- */
.message {
  display: flex;
  flex-direction: column;
  animation: msgIn 0.3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-items: flex-end;
}

.message.assistant {
  align-items: flex-start;
}

.message-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  overflow-wrap: break-word;
  position: relative;
}

.message.user .message-bubble {
  background: var(--user-bubble);
  color: var(--user-bubble-text);
  border-bottom-right-radius: 4px;
}

.message.assistant .message-bubble {
  background: var(--assistant-bubble);
  color: var(--assistant-bubble-text);
  border-bottom-left-radius: 4px;
}

.message-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  padding: 0 4px;
}

/* -- Thinking Block -- */
.thinking-block {
  max-width: 85%;
  border: 1px solid var(--thinking-border);
  background: var(--thinking-bg);
  border-radius: var(--radius-sm);
  overflow: hidden;
  animation: msgIn 0.3s ease;
}

.thinking-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
  user-select: none;
  transition: background var(--transition);
}

.thinking-header:hover {
  background: var(--bg-tertiary);
}

.thinking-chevron {
  display: inline-block;
  transition: transform 0.2s ease;
  font-size: 10px;
}

.thinking-block.collapsed .thinking-chevron {
  transform: rotate(-90deg);
}

.thinking-block.collapsed .thinking-content {
  display: none;
}

.thinking-content {
  padding: 8px 12px 12px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  border-top: 1px solid var(--thinking-border);
  white-space: pre-wrap;
}

/* -- Tool Call / Result -- */
.tool-block {
  max-width: 85%;
  border: 1px solid var(--tool-border);
  background: var(--tool-bg);
  border-radius: var(--radius-sm);
  overflow: hidden;
  animation: msgIn 0.3s ease;
}

.tool-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: rgba(79, 143, 247, 0.06);
  border-bottom: 1px solid var(--tool-border);
  font-family: var(--font-mono);
}

.tool-header .tool-icon {
  font-size: 14px;
}

.tool-body {
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
}

.tool-result .tool-header {
  color: var(--success);
  background: rgba(34, 197, 94, 0.06);
}

/* -- Streaming / Typing -- */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 6px;
  height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* -- Markdown in assistant messages -- */
.message.assistant .message-bubble h1,
.message.assistant .message-bubble h2,
.message.assistant .message-bubble h3 {
  margin: 12px 0 6px;
  line-height: 1.3;
}

.message.assistant .message-bubble h1 { font-size: 1.3em; }
.message.assistant .message-bubble h2 { font-size: 1.15em; }
.message.assistant .message-bubble h3 { font-size: 1.05em; }

.message.assistant .message-bubble p {
  margin: 6px 0;
}

.message.assistant .message-bubble ul,
.message.assistant .message-bubble ol {
  margin: 6px 0;
  padding-left: 20px;
}

.message.assistant .message-bubble li {
  margin: 2px 0;
}

.message.assistant .message-bubble a {
  color: var(--accent);
  text-decoration: underline;
}

.message.assistant .message-bubble blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}

.message.assistant .message-bubble table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
  font-size: 13px;
}

.message.assistant .message-bubble th,
.message.assistant .message-bubble td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}

.message.assistant .message-bubble th {
  background: var(--bg-tertiary);
  font-weight: 600;
}

/* -- Code blocks -- */
.code-wrapper {
  position: relative;
  margin: 8px 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
}

.code-wrapper .code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: var(--bg-tertiary);
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.code-wrapper .copy-btn {
  padding: 2px 8px;
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font);
  transition: all var(--transition);
}

.code-wrapper .copy-btn:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.code-wrapper pre {
  margin: 0;
  padding: 12px;
  overflow-x: auto;
  background: var(--bg-primary) !important;
}

.code-wrapper code {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
}

.message.assistant .message-bubble code:not(.code-wrapper code) {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.9em;
}

/* -- System Messages -- */
.system-message {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  padding: 4px 0;
  animation: msgIn 0.3s ease;
}

.system-message.error-msg {
  color: var(--error);
}

/* -- Input Area -- */
.input-area {
  padding: 16px 20px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-wrapper {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  transition: border-color var(--transition);
}

.input-wrapper:focus-within {
  border-color: var(--accent);
}

.input-wrapper textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font);
  line-height: 1.5;
  resize: none;
  max-height: 200px;
  min-height: 24px;
  padding: 4px 0;
}

.input-wrapper textarea::placeholder {
  color: var(--text-muted);
}

.send-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
}

.send-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: scale(1.05);
}

.send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.send-btn svg {
  width: 18px;
  height: 18px;
}

/* -- Session Drawer -- */
.session-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 199;
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}

.session-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.session-drawer {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100%;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  box-shadow: 4px 0 24px rgba(0, 0, 0, 0.25);
  z-index: 200;
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
}

.session-drawer.open {
  transform: translateX(0);
}

.session-drawer.pinned {
  transform: translateX(0);
  box-shadow: none;
}

body.drawer-pinned #chat-screen {
  margin-left: 260px;
}

.session-drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.session-drawer-header h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}

.session-drawer-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.session-drawer-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 14px;
  transition: all var(--transition);
}

.session-drawer-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.session-drawer-btn.pinned {
  color: var(--accent);
}

.session-drawer-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}

.session-item {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}

.session-item:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.session-item.active {
  color: var(--accent);
  font-weight: 600;
  background: var(--accent-dim);
}

/* ===== Mobile ===== */
@media (max-width: 640px) {
  .login-card { padding: 28px 20px; }
  .chat-header { padding: 10px 14px; }
  .messages-container { padding: 14px; }
  .input-area { padding: 10px 14px; }
  .message-bubble { max-width: 92%; }
  .thinking-block, .tool-block { max-width: 92%; }
}
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <img src="/static/astron_logo.png" class="logo" alt="Astron Claw">
      <h1>Astron Claw</h1>
      <p>Connect to your AI assistant</p>
    </div>
    <div class="form-group">
      <label for="token-input">Bot Token</label>
      <input type="password" id="token-input" placeholder="sk-xxxx..." autocomplete="off">
    </div>
    <div class="form-group">
      <label for="server-input">Server URL (optional)</label>
      <input type="text" id="server-input" placeholder="Leave empty for current host">
    </div>
    <button class="btn btn-primary" id="connect-btn" onclick="handleConnect()">Connect</button>
    <div class="login-status" id="login-status"></div>
  </div>
</div>

<!-- ===== Chat Screen ===== -->
<div id="chat-screen" class="hidden">
  <!-- Header -->
  <div class="chat-header">
    <button class="icon-btn" onclick="toggleSessionPanel()" title="Sessions">&#9776;</button>
    <div class="brand">
      <img src="/static/astron_logo.png" class="logo-sm" alt="Logo">
      <span>Astron Claw</span>
    </div>
    <div class="status-indicator">
      <div class="status-dot" id="ws-status-dot"></div>
      <span id="ws-status-text">Connected</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="newSession()" title="New chat">&#43;</button>
      <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <span id="theme-icon">&#9790;</span>
      </button>
      <button class="icon-btn" onclick="disconnect()" title="Disconnect">
        &#10005;
      </button>
    </div>
  </div>

  <!-- Bot Status Banner -->
  <div class="bot-banner hidden" id="bot-banner"></div>

  <!-- Messages -->
  <div class="messages-container" id="messages-container">
    <div class="messages-list" id="messages-list"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="msg-input" rows="1" placeholder="Type a message..." onkeydown="handleKeyDown(event)" oninput="autoGrow(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Session Drawer -->
<div class="session-overlay" id="session-overlay" onclick="hideSessionPanel()"></div>
<div class="session-drawer" id="session-drawer">
  <div class="session-drawer-header">
    <h3>Sessions</h3>
    <div class="session-drawer-actions">
      <button class="session-drawer-btn" id="pin-btn" onclick="togglePinDrawer()" title="Pin drawer">&#128204;</button>
      <button class="session-drawer-btn" id="close-drawer-btn" onclick="hideSessionPanel()" title="Close">&#10005;</button>
    </div>
  </div>
  <div class="session-drawer-list" id="session-list"></div>
</div>

<!-- CDN Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
// ===== State =====
let ws = null;
let token = '';
let serverUrl = '';
let isStreaming = false;
let currentAssistantEl = null;
let currentAssistantText = '';
let reconnectAttempts = 0;
let reconnectTimer = null;
let botConnected = false;
let currentSessionId = null;
let sessionList = [];        // [{id, number}, ...]
let sessionMessages = {};    // sessionId -> innerHTML of messages-list
let drawerPinned = localStorage.getItem('astron-drawer-pinned') === '1';

const MAX_RECONNECT_ATTEMPTS = 10;
const RECONNECT_BASE_DELAY = 1000;

// ===== Markdown Setup =====
if (typeof marked !== 'undefined') {
  const renderer = new marked.Renderer();

  renderer.code = function({ text, lang }) {
    const language = lang || 'plaintext';
    let highlighted;
    try {
      if (hljs && hljs.getLanguage(language)) {
        highlighted = hljs.highlight(text, { language }).value;
      } else {
        highlighted = hljs.highlightAuto(text).value;
      }
    } catch {
      highlighted = escapeHtml(text);
    }
    const id = 'code-' + Math.random().toString(36).slice(2, 10);
    return `<div class="code-wrapper">
      <div class="code-header">
        <span>${escapeHtml(language)}</span>
        <button class="copy-btn" onclick="copyCode('${id}')">Copy</button>
      </div>
      <pre><code id="${id}" class="hljs language-${escapeHtml(language)}">${highlighted}</code></pre>
    </div>`;
  };

  marked.setOptions({
    renderer,
    gfm: true,
    breaks: true,
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderMarkdown(text) {
  if (typeof marked !== 'undefined') {
    try {
      return marked.parse(text);
    } catch {
      return escapeHtml(text);
    }
  }
  return escapeHtml(text).replace(/\n/g, '<br>');
}

// ===== Theme =====
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-icon').innerHTML = next === 'dark' ? '&#9790;' : '&#9788;';

  // Switch highlight.js theme
  const hljsLink = document.getElementById('hljs-theme');
  if (next === 'light') {
    hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  } else {
    hljsLink.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
  }

  localStorage.setItem('astron-theme', next);
}

// Load saved theme
(function() {
  const saved = localStorage.getItem('astron-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('theme-icon').innerHTML = saved === 'dark' ? '&#9790;' : '&#9788;';
  }
})();

// ===== Connection =====
function handleConnect() {
  token = document.getElementById('token-input').value.trim();
  if (!token) {
    showLoginStatus('Please enter a bot token', 'error');
    return;
  }

  const serverInput = document.getElementById('server-input').value.trim();
  if (serverInput) {
    serverUrl = serverInput.replace(/\/+$/, '');
  } else {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    serverUrl = `${proto}//${location.host}`;
  }

  // Normalize serverUrl to ws/wss
  if (serverUrl.startsWith('http://')) {
    serverUrl = 'ws://' + serverUrl.slice(7);
  } else if (serverUrl.startsWith('https://')) {
    serverUrl = 'wss://' + serverUrl.slice(8);
  } else if (!serverUrl.startsWith('ws://') && !serverUrl.startsWith('wss://')) {
    serverUrl = 'ws://' + serverUrl;
  }

  connectWebSocket();
}

function connectWebSocket() {
  const connectBtn = document.getElementById('connect-btn');
  connectBtn.disabled = true;
  showLoginStatus('<span class="spinner"></span> Connecting...', 'connecting');

  const url = `${serverUrl}/bridge/chat?token=${encodeURIComponent(token)}`;

  try {
    ws = new WebSocket(url);
  } catch (e) {
    showLoginStatus('Invalid server URL', 'error');
    connectBtn.disabled = false;
    return;
  }

  ws.onopen = function() {
    reconnectAttempts = 0;
    showLoginStatus('Validating token...', 'connecting');
  };

  ws.onmessage = function(event) {
    try {
      const msg = JSON.parse(event.data);
      // First message from server means token is valid — enter chat
      if (!document.getElementById('login-screen').classList.contains('hidden')) {
        showLoginStatus('Connected!', 'success');
        setTimeout(() => {
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('chat-screen').classList.remove('hidden');
          updateConnectionStatus(true);
          restoreDrawerState();
          document.getElementById('msg-input').focus();
        }, 300);
      }
      handleServerMessage(msg);
    } catch (e) {
      console.error('Failed to parse message:', e);
    }
  };

  ws.onerror = function() {
    if (document.getElementById('login-screen').classList.contains('hidden')) {
      // Already in chat
      updateConnectionStatus(false);
    } else {
      showLoginStatus('Connection failed', 'error');
      connectBtn.disabled = false;
    }
  };

  ws.onclose = function(event) {
    if (document.getElementById('login-screen').classList.contains('hidden')) {
      updateConnectionStatus(false);
      finalizeStream();
      addSystemMessage('Connection lost. Attempting to reconnect...');
      attemptReconnect();
    } else {
      const reason = event.reason || 'Connection closed';
      showLoginStatus(reason, 'error');
      connectBtn.disabled = false;
    }
  };
}

function attemptReconnect() {
  if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
    addSystemMessage('Reconnection failed after multiple attempts. Please refresh.', true);
    return;
  }

  reconnectAttempts++;
  const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts - 1), 30000);

  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => {
    addSystemMessage(`Reconnecting (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
    const url = `${serverUrl}/bridge/chat?token=${encodeURIComponent(token)}`;

    try {
      ws = new WebSocket(url);
    } catch {
      attemptReconnect();
      return;
    }

    ws.onopen = function() {
      reconnectAttempts = 0;
      updateConnectionStatus(true);
      addSystemMessage('Reconnected successfully!');
      document.getElementById('msg-input').focus();
    };

    ws.onmessage = function(event) {
      try {
        const msg = JSON.parse(event.data);
        handleServerMessage(msg);
      } catch (e) {
        console.error('Failed to parse message:', e);
      }
    };

    ws.onerror = function() {
      updateConnectionStatus(false);
    };

    ws.onclose = function() {
      updateConnectionStatus(false);
      finalizeStream();
      attemptReconnect();
    };
  }, delay);
}

function disconnect() {
  clearTimeout(reconnectTimer);
  reconnectAttempts = MAX_RECONNECT_ATTEMPTS; // Prevent auto-reconnect
  if (ws) {
    ws.close();
    ws = null;
  }
  isStreaming = false;
  currentAssistantEl = null;
  currentAssistantText = '';
  currentSessionId = null;
  sessionList = [];
  sessionMessages = {};

  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('messages-list').innerHTML = '';
  document.getElementById('connect-btn').disabled = false;
  showLoginStatus('', '');
  reconnectAttempts = 0;

  const banner = document.getElementById('bot-banner');
  banner.classList.add('hidden');
  // Reset drawer DOM state (keep pinned preference in localStorage)
  document.getElementById('session-drawer').classList.remove('open', 'pinned');
  document.getElementById('session-overlay').classList.remove('open');
  document.body.classList.remove('drawer-pinned');
}

function updateConnectionStatus(connected) {
  const dot = document.getElementById('ws-status-dot');
  const text = document.getElementById('ws-status-text');

  dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
  text.textContent = connected ? 'Connected' : 'Disconnected';
}

function showLoginStatus(html, type) {
  const el = document.getElementById('login-status');
  el.innerHTML = html;
  el.className = 'login-status ' + (type || '');
}

// ===== Message Handling =====
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'chunk':
      handleChunk(msg.content || '');
      break;
    case 'thinking':
      handleThinking(msg.content || '');
      break;
    case 'tool_call':
      handleToolCall(msg.name || 'unknown', msg.input || '');
      break;
    case 'tool_result':
      handleToolResult(msg.content || '');
      break;
    case 'done':
      handleDone();
      break;
    case 'error':
      handleError(msg.content || 'Unknown error');
      break;
    case 'bot_status':
      handleBotStatus(msg.connected);
      break;
    case 'session_info':
      currentSessionId = msg.sessionId;
      sessionList = msg.sessions || [];
      renderSessionPanel();
      break;
    case 'new_session_ack':
      currentSessionId = msg.sessionId;
      sessionList = msg.sessions || [];
      document.getElementById('messages-list').innerHTML = '';
      addSystemMessage('New session started');
      renderSessionPanel();
      break;
    case 'switch_session_ack':
      currentSessionId = msg.sessionId;
      sessionList = msg.sessions || [];
      restoreSessionMessages(msg.sessionId);
      renderSessionPanel();
      if (!drawerPinned) hideSessionPanel();
      break;
    default:
      console.log('Unknown message type:', msg.type);
  }
}

function handleChunk(content) {
  if (!isStreaming) {
    isStreaming = true;
    currentAssistantText = '';
    currentAssistantEl = createAssistantMessage();
    setInputEnabled(false);
  }
  currentAssistantText += content;
  updateAssistantMessage();
  scrollToBottom();
}

function handleThinking(content) {
  const list = document.getElementById('messages-list');
  const block = document.createElement('div');
  block.className = 'thinking-block';
  block.innerHTML = `
    <div class="thinking-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="thinking-chevron">&#9660;</span>
      <span>Thinking...</span>
    </div>
    <div class="thinking-content">${escapeHtml(content)}</div>
  `;
  list.appendChild(block);
  scrollToBottom();
}

function handleToolCall(name, input) {
  finalizeStream();
  const list = document.getElementById('messages-list');
  const block = document.createElement('div');
  block.className = 'tool-block';

  let formattedInput = input;
  try {
    const parsed = JSON.parse(input);
    formattedInput = JSON.stringify(parsed, null, 2);
  } catch { /* keep original */ }

  block.innerHTML = `
    <div class="tool-header">
      <span class="tool-icon">&#9881;</span>
      <span>${escapeHtml(name)}</span>
    </div>
    <div class="tool-body">${escapeHtml(formattedInput)}</div>
  `;
  list.appendChild(block);
  scrollToBottom();
}

function handleToolResult(content) {
  const list = document.getElementById('messages-list');
  const block = document.createElement('div');
  block.className = 'tool-block tool-result';

  let formattedContent = content;
  try {
    const parsed = JSON.parse(content);
    formattedContent = JSON.stringify(parsed, null, 2);
  } catch { /* keep original */ }

  block.innerHTML = `
    <div class="tool-header">
      <span class="tool-icon">&#10003;</span>
      <span>Result</span>
    </div>
    <div class="tool-body">${escapeHtml(formattedContent)}</div>
  `;
  list.appendChild(block);
  scrollToBottom();
}

function handleDone() {
  finalizeStream();
  setInputEnabled(true);
  document.getElementById('msg-input').focus();
}

function handleError(content) {
  finalizeStream();
  addSystemMessage(content, true);
  setInputEnabled(true);
}

function handleBotStatus(connected) {
  botConnected = connected;
  const banner = document.getElementById('bot-banner');
  if (connected) {
    banner.textContent = 'Bot connected';
    banner.className = 'bot-banner';
  } else {
    banner.textContent = 'Bot disconnected -- waiting for bot to connect';
    banner.className = 'bot-banner disconnected';
  }
  banner.classList.remove('hidden');
}

// ===== Rendering Helpers =====
function createAssistantMessage() {
  const list = document.getElementById('messages-list');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(new Date());

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(time);
  list.appendChild(msgDiv);

  return bubble;
}

function updateAssistantMessage() {
  if (!currentAssistantEl) return;
  currentAssistantEl.innerHTML = renderMarkdown(currentAssistantText);
}

function finalizeStream() {
  if (isStreaming && currentAssistantEl && currentAssistantText) {
    currentAssistantEl.innerHTML = renderMarkdown(currentAssistantText);
  }
  isStreaming = false;
  currentAssistantEl = null;
  currentAssistantText = '';
}

function addUserMessage(text) {
  const list = document.getElementById('messages-list');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message user';

  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(new Date());

  msgDiv.appendChild(bubble);
  msgDiv.appendChild(time);
  list.appendChild(msgDiv);
  scrollToBottom();
}

function addSystemMessage(text, isError) {
  const list = document.getElementById('messages-list');
  const div = document.createElement('div');
  div.className = 'system-message' + (isError ? ' error-msg' : '');
  div.textContent = text;
  list.appendChild(div);
  scrollToBottom();
}

function formatTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ===== Sending =====
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addUserMessage(text);
  ws.send(JSON.stringify({ type: 'message', content: text }));

  input.value = '';
  input.style.height = 'auto';
  setInputEnabled(false);
  scrollToBottom();
}

function newSession() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  saveCurrentSessionMessages();
  ws.send(JSON.stringify({ type: 'new_session' }));
  finalizeStream();
}

function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function setInputEnabled(enabled) {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  input.disabled = !enabled;
  btn.disabled = !enabled;
  if (enabled) {
    input.focus();
  }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ===== Session Management =====
function saveCurrentSessionMessages() {
  if (currentSessionId) {
    sessionMessages[currentSessionId] = document.getElementById('messages-list').innerHTML;
  }
}

function restoreSessionMessages(id) {
  const list = document.getElementById('messages-list');
  list.innerHTML = sessionMessages[id] || '';
  scrollToBottom();
}

function switchSession(id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (id === currentSessionId) {
    if (!drawerPinned) hideSessionPanel();
    return;
  }
  finalizeStream();
  saveCurrentSessionMessages();
  ws.send(JSON.stringify({ type: 'switch_session', sessionId: id }));
}

function toggleSessionPanel() {
  const drawer = document.getElementById('session-drawer');
  if (drawerPinned) {
    // Pinned mode: unpin and hide
    unpinDrawer();
    return;
  }
  const isOpen = drawer.classList.contains('open');
  if (isOpen) {
    hideSessionPanel();
  } else {
    drawer.classList.add('open');
    document.getElementById('session-overlay').classList.add('open');
  }
}

function hideSessionPanel() {
  if (drawerPinned) return;
  document.getElementById('session-drawer').classList.remove('open');
  document.getElementById('session-overlay').classList.remove('open');
}

function togglePinDrawer() {
  if (drawerPinned) {
    unpinDrawer();
  } else {
    pinDrawer();
  }
}

function pinDrawer() {
  drawerPinned = true;
  localStorage.setItem('astron-drawer-pinned', '1');
  const drawer = document.getElementById('session-drawer');
  drawer.classList.remove('open');
  drawer.classList.add('pinned');
  document.getElementById('session-overlay').classList.remove('open');
  document.body.classList.add('drawer-pinned');
  document.getElementById('pin-btn').classList.add('pinned');
  document.getElementById('close-drawer-btn').style.display = 'none';
}

function unpinDrawer() {
  drawerPinned = false;
  localStorage.setItem('astron-drawer-pinned', '0');
  const drawer = document.getElementById('session-drawer');
  drawer.classList.remove('pinned');
  document.body.classList.remove('drawer-pinned');
  document.getElementById('pin-btn').classList.remove('pinned');
  document.getElementById('close-drawer-btn').style.display = '';
}

function restoreDrawerState() {
  if (drawerPinned) {
    const drawer = document.getElementById('session-drawer');
    drawer.classList.add('pinned');
    document.body.classList.add('drawer-pinned');
    document.getElementById('pin-btn').classList.add('pinned');
    document.getElementById('close-drawer-btn').style.display = 'none';
  }
}

function renderSessionPanel() {
  const listEl = document.getElementById('session-list');
  // Render newest first
  const reversed = [...sessionList].reverse();
  listEl.innerHTML = reversed.map(s => {
    const active = s.id === currentSessionId ? ' active' : '';
    return `<div class="session-item${active}" onclick="switchSession('${s.id}')">Session ${s.number}</div>`;
  }).join('');
}

// ===== Scroll =====
function scrollToBottom() {
  const container = document.getElementById('messages-container');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

// ===== Copy Code =====
function copyCode(id) {
  const codeEl = document.getElementById(id);
  if (!codeEl) return;
  const text = codeEl.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = codeEl.closest('.code-wrapper').querySelector('.copy-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {});
}

// ===== Init =====
document.getElementById('token-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleConnect();
});

document.getElementById('server-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleConnect();
});
</script>
</body>
</html>
